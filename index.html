<!DOCTYPE html>
<html lang="en">
<head>

    <title>Home</title>
    <script src="script.js" defer></script>

</head>
<body>
    <h2>Steven's Pizzeria</h2>
    <h4>What is your name?</h4>
    <input type="text" id="name">

    <h4>Select a pizza size</h4>

    <input type="radio" name="size" Large>
    <input type="radio" name="size" XLarge>
    <br>
    
    <h4>Select 2 base toppings (free of charge)</h4>
    <input type="checkbox" name="freetoppings">
