<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steven's Pizzeria</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
<!-- 
    This project is a pizza builder website. It will contain input for user names, pizza
     size, toppings, etc. It will contain a list with user-selected toppings.
    It will contain a function to compute the final cost of the pizza (the parameters, 
    for now, are size and topping count. More parameters will be added on soon.)
-->
</head>
<body>
    <h2>Steven's Pizzeria</h2>
    <h4>What is your name?</h4>
    <input type="text" id="name">
    <br>

    <h4>Select a pizza size</h4>
    <form id="sizeForm">
        <input type="radio" id="small" name="size" value="Small">
        <label for="small">Small | $10.00 </label>
  
        <input type="radio" id="medium" name="size" value="Medium">
        <label for="medium">Medium | $15.00 </label>
  
        <input type="radio" id="large" name="size" value="Large">
        <label for="large">Large | $18.00</label>
  
        <input type="radio" id="xlarge" name="size" value="Extra Large">
        <label for="xlarge">Xtra™ Large | $25.00</label>
    </form>

    <br>
    
    <h4 id="toppingsmsg">Select 2 base toppings (free of charge)</h4>

    <form id="toppings">
        <input type="checkbox" name="freetoppings" value="pepperoni">
        <label>Pepperoni</label>

        <input type="checkbox" name="freetoppings" value="sausage">
        <label>Sausage</label>

        <input type="checkbox" name="freetoppings" value="ham">
        <label>Ham</label>

        <input type="checkbox" name="freetoppings" value="anchovies">
        <label>Anchovies</label>

        <input type="checkbox" name="freetoppings" value="spinach">
        <label>Spinach</label>

        <input type="checkbox" name="freetoppings" value="bellpepper">
        <label>Bell Pepper</label>

        <input type="checkbox" name="freetoppings" value="mushroom">
        <label>Mushroom</label>

        <input type="checkbox" name="freetoppings" value="onion">
        <label>Onion</label>

        <input type="checkbox" name="freetoppings" value="tomatoes">
        <label>Tomatoes</label>

        <input type="checkbox" name="freetoppings" value="olives">
        <label>Olives</label>
    </form>

    <h4>Delivery Details</h4>

    <form>
        <input type="radio" name="deliverymethod" value="instore">
        <label>In-store Pickup (no addtl. charge)</label>

        <input type="radio" name="deliverymethod" value="curbside">
        <label>Curbside Pickup ($3 extra)</label>

        <input type="radio" name="deliverymethod" value="delivery">
        <label>Delivery ($15 extra)</label>
    </form>
    <br>

    <h4>Order Details</h4>
    <p id="ordersummary"></p>

    <button id="submitorder">Submit order!</button>
</body>
</html>
